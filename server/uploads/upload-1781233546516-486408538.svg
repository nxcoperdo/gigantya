<svg width="500" height="210" viewBox="0 0 510 210" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo v2 — El Sabor Giganteño</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo horizontal del restaurante El Sabor Giganteño sobre fondo crema, con ícono de olla central y tipografía marrón oscura.</desc>

  <!-- Fondo crema cálido — completamente distinto al banner rojo -->
  <rect width="500" height="200" fill="#FDF3E3" style="fill:rgb(253, 243, 227);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Franja superior tierra delgada -->
  <rect width="500" height="5" fill="#3D1C02" style="fill:rgb(61, 28, 2);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Franja inferior tierra delgada -->
  <rect x="0" y="195" width="500" height="5" fill="#3D1C02" style="fill:rgb(61, 28, 2);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- === ÍCONO: olla/cazuela estilizada (izquierda) === -->
  <g transform="translate(100, 100)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Tapa -->
    <ellipse cx="0" cy="-36" rx="34" ry="7" fill="none" stroke="#3D1C02" stroke-width="2.2" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:2.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <ellipse cx="0" cy="-40" rx="8" ry="5" fill="#C0392B" stroke="#3D1C02" stroke-width="1.5" style="fill:rgb(192, 57, 43);stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Cuerpo de la olla -->
    <path d="M-34 -28 Q-38 10 -30 30 Q-15 44 0 44 Q15 44 30 30 Q38 10 34 -28 Z" fill="#C0392B" stroke="#3D1C02" stroke-width="2.2" style="fill:rgb(192, 57, 43);stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:2.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Asa izquierda -->
    <path d="M-34 -10 Q-52 -10 -52 8 Q-52 22 -36 22" fill="none" stroke="#3D1C02" stroke-width="2.5" stroke-linecap="round" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Asa derecha -->
    <path d="M34 -10 Q52 -10 52 8 Q52 22 36 22" fill="none" stroke="#3D1C02" stroke-width="2.5" stroke-linecap="round" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Reflejo/brillo en olla -->
    <path d="M-18 -20 Q-10 -10 -18 5" fill="none" stroke="#E8907A" stroke-width="2" stroke-linecap="round" opacity="0.5" style="fill:none;stroke:rgb(232, 144, 122);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Vapor -->
    <path d="M-12 -48 Q-8 -60 -12 -72" fill="none" stroke="#3D1C02" stroke-width="1.8" stroke-linecap="round" opacity="0.35" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animate attributeName="d" values="M-12 -48 Q-8 -60 -12 -72;M-12 -48 Q-16 -60 -12 -72;M-12 -48 Q-8 -60 -12 -72" dur="2.5s" repeatCount="indefinite" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </path>
    <path d="M0 -50 Q4 -63 0 -76" fill="none" stroke="#3D1C02" stroke-width="1.8" stroke-linecap="round" opacity="0.3" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animate attributeName="d" values="M0 -50 Q4 -63 0 -76;M0 -50 Q-4 -63 0 -76;M0 -50 Q4 -63 0 -76" dur="2s" repeatCount="indefinite" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </path>
    <path d="M12 -48 Q16 -60 12 -72" fill="none" stroke="#3D1C02" stroke-width="1.8" stroke-linecap="round" opacity="0.25" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animate attributeName="d" values="M12 -48 Q16 -60 12 -72;M12 -48 Q8 -60 12 -72;M12 -48 Q16 -60 12 -72" dur="3s" repeatCount="indefinite" style="fill:none;stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </path>
  </g>

  <!-- Separador vertical sutil -->
  <line x1="175" y1="30" x2="175" y2="170" stroke="#3D1C02" stroke-width="0.8" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(61, 28, 2);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- === TEXTO DERECHO === -->
  <!-- "el" minúscula cursiva, pequeño y elegante -->
  <text x="196" y="72" font-family="'Georgia', serif" font-size="18" fill="#C0392B" font-style="italic" font-weight="400" style="fill:rgb(192, 57, 43);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:18px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">el</text>

  <!-- SABOR grande, marrón oscuro, condensado -->
  <text x="192" y="128" font-family="'Georgia', serif" font-size="66" fill="#3D1C02" font-weight="700" letter-spacing="-1" style="fill:rgb(61, 28, 2);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:66px;font-weight:700;text-anchor:start;dominant-baseline:auto">SABOR</text>

  <!-- Línea roja bajo SABOR -->
  <rect x="192" y="134" width="290" height="3" fill="#C0392B" rx="1" style="fill:rgb(192, 57, 43);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- GIGANTEÑO pequeño, espaciado, en rojo -->
  <text x="192" y="160" font-family="'Georgia', serif" font-size="15" fill="#C0392B" font-weight="400" letter-spacing="7" style="fill:rgb(192, 57, 43);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:15px;font-weight:400;text-anchor:start;dominant-baseline:auto">GIGANTEÑO</text>

  <!-- Punto decorativo al final -->
  <circle cx="474" cy="155" r="2.5" fill="#C0392B" style="fill:rgb(192, 57, 43);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>