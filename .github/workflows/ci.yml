name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: restaurante_pedidos_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: restaurante_pedidos_test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd server
          npm install

      - name: Ensure test DB exists
        # Defensa: aunque el servicio mysql:8.0 declara MYSQL_DATABASE,
        # ocasionalmente la DB no llega materializada cuando las
        # migraciones Knex arrancan (timing entre el healthcheck y
        # el init del schema). El script setup-test-db.js falla con
        # un error claro en ese caso, pero preferimos blindar CI
        # creando la DB explícitamente. CREATE DATABASE IF NOT EXISTS
        # es idempotente: si ya existe, no hace nada.
        # Usa el cliente mysql (instalado por mysql-client en el runner
        # ubuntu-latest; si en el futuro no está, agregar
        # `sudo apt-get install -y mysql-client` antes).
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL listo"
              break
            fi
            echo "Esperando MySQL... intento $i"
            sleep 2
          done
          mysql -h 127.0.0.1 -uroot -proot -e \
            "CREATE DATABASE IF NOT EXISTS restaurante_pedidos_test \
             CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci"
          echo "✅ DB de test asegurada"

      - name: Run Backend Tests
        run: |
          cd server
          npm test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm install

      - name: Run Frontend Tests
        run: |
          cd client
          npm test
