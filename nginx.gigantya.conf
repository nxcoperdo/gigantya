# ==========================================================
# 🌐 NGINX CONFIGURATION - GIGANTYA PRODUCTION
# ==========================================================
# Ubicación: /etc/nginx/sites-available/gigantya
# Activar:    sudo ln -s /etc/nginx/sites-available/gigantya /etc/nginx/sites-enabled/
# Testear:    sudo nginx -t
# Recargar:   sudo systemctl reload nginx
# ==========================================================

# Redireccionar HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gigantya.com www.gigantya.com;

    # Certbot challenge (renovación SSL automática)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo el tráfico HTTP a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gigantya.com www.gigantya.com;

    # ===== SSL (gestionado por Certbot) =====
    ssl_certificate /etc/letsencrypt/live/gigantya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gigantya.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/gigantya.com/chain.pem;

    # SSL optimizado
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # ===== SECURITY HEADERS =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ===== GZIP COMPRESSION =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ===== UPLOADS =====
    # IMPORTANTE: este location va ANTES del location /, porque si va después
    # nginx matchea primero el location / y nunca llega a este bloque.
    # Servir archivos estáticos directamente desde el filesystem.
    # Usar 'alias' (no 'root') para que NO concatene con /var/www/gigantya/client/dist.
    location /uploads/ {
        alias /var/www/gigantya/server/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;

        # Tipos MIME correctos
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
            image/svg+xml svg;
            image/avif avif;
            application/pdf pdf;
        }
        default_type application/octet-stream;
    }

    # ===== FRONTEND (archivos estáticos de Vite) =====
    root /var/www/gigantya/client/dist;
    index index.html;

    # SPA routing - redirigir todo a index.html (React Router)
    # El bloque /uploads/ de arriba matchea antes y NO entra acá.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ===== ASSETS ESTÁTICOS =====
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
    }

    location ~* \.(png|jpe?g|gif|svg|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ===== BACKEND API =====
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ===== SOCKET.IO =====
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ===== HEALTH CHECK =====
    location /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:5000/api/health;
    }

    # ===== DENY acceso a archivos ocultos =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== DENY acceso a archivos de backup =====
    location ~* \.(bak|sql|log|conf|env)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== LIMITS =====
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ===== LOGS =====
    access_log /var/log/nginx/gigantya_access.log;
    error_log /var/log/nginx/gigantya_error.log warn;
}
